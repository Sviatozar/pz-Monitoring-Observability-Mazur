# Mosquitto Configuration File

# Default listener
listener 1883
protocol mqtt

# TLS listener
listener 8883
protocol mqtt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2

# WebSocket listener
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# Security
allow_anonymous true
# For production, uncomment and set password_file
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl.txt

# Max connections
max_connections -1
max_queued_messages 1000

# Message limits
message_size_limit 0

# Connection settings
allow_zero_length_clientid false
auto_id_prefix mosquitto_
