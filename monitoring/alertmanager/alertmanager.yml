global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/*.tmpl'

route:
  receiver: 'telegram-notifications'
  
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 1s
  group_interval: 5s
  repeat_interval: 1h

  routes:
    - match:
        severity: critical
      receiver: 'telegram-critical'
      group_wait: 1s
      group_interval: 5s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'telegram-warnings'
      group_wait: 30s
      group_interval: 30s
      repeat_interval: 6h

    - match:
        service: emqx
      receiver: 'telegram-critical'

    - match:
        service: webapi
      receiver: 'telegram-critical'

receivers:
  - name: 'telegram-critical'
    webhook_configs:
      - url: 'http://telegram-webhook:3000/alert'
        send_resolved: true

  - name: 'telegram-warnings'
    webhook_configs:
      - url: 'http://telegram-webhook:3000/alert'
        send_resolved: true

  - name: 'telegram-notifications'
    webhook_configs:
      - url: 'http://telegram-webhook:3000/alert'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  - source_match:
      alertname: 'ContainerDown'
    target_match_re:
      severity: '^(critical|warning)$'
    equal: ['service']