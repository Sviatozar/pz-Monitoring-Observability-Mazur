global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: 'monitoring-observability'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Alert rules
rule_files:
  - 'alert.rules.yml'

scrape_configs:
  # ============================================
  # Prometheus Self-monitoring
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================
  # WebAPI Metrics
  # ============================================
  - job_name: 'webapi'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webapi:5000']
    #scrape_interval: 10s
    scrape_timeout: 5s

  # ============================================
  # cAdvisor - Container Metrics
  # ============================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 10s

  # ============================================
  # Node Exporter - System Metrics
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 10s

  # ============================================
  # EMQX MQTT Broker
  # ============================================
  - job_name: 'emqx'
    static_configs:
      - targets: ['emqx:18083']
    metrics_path: '/api/v5/prometheus/stats'
    #scrape_interval: 30s
    scrape_timeout: 2s
